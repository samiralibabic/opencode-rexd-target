name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build plugin bundle
        run: bun run build

      - name: Assemble release archive
        run: |
          mkdir -p release/plugins release/commands
          cp dist/index.js release/plugins/rexd-target.js
          cp .opencode/commands/target.md release/commands/target.md
          tar -C release -czf release/opencode-rexd-target.tar.gz plugins commands

      - name: Generate checksums
        run: |
          cd release
          sha256sum opencode-rexd-target.tar.gz > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/opencode-rexd-target.tar.gz
            release/checksums.txt
          generate_release_notes: true
