name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Validate installer script
        run: bash -n ./scripts/install.sh

  latest-plugin-compatibility:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install latest plugin API without saving
        run: bun add --no-save @opencode-ai/plugin@latest

      - name: Test against latest plugin API
        run: bun test && bun run typecheck && bun run build
